<div class="col-xl-12 col-md-3" ngbDropdown>
  <app-card cardTitle="Orders" cardClass="table-card" blockClass="p-0">
    <br>

    <div class=" col-md-3" class="input-group"  style="width: 51%;height: 20%;position: relative;left: 3%;">
      <input  type="search"  style="background-color: #F5F5F5" class="form-control rounded" placeholder="Search Order By Code,Customer,Date..." aria-label="Search" aria-describedby="search-addon" />
      <button type="button"  class="btn btn-primary b1">search</button>
      &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
      <button type="button" class="btn btn-icon btn-primary"><i class="feather icon-rotate-cw" ></i></button>

    </div>


    <hr>
    <br>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
        <tr>
          <th>
            Order°
          </th>
          <th>Customer</th>
          <th>Order date</th>
          <th>Total Price</th>
          <th>Status</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let o of orders index as i ">
          <td>
            <div class="d-inline-block align-middle">
              <div class="d-inline-block">
                <h6>{{o.code}} </h6>
              </div>
            </div>
          </td>
          <td>{{o.customer.code}}</td>
          <td>{{o.orderDate | date: 'dd/MM/yyyy hh:mm a'}}</td>
          <td>{{o.totalPrice}} <b>MAD</b></td>
          <td *ngIf="o.status=='PENDING'"><label class="badge badge-light-warning">Pending</label>         </td>


          <td>
            &nbsp;&nbsp;&nbsp; <button type="button" class="btn btn-icon btn-outline-success" (click)="detail(o.code)"><i class="feather icon-zoom-in" title="Details"></i></button>

          </td>


        </tbody>
      </table>
    </div>
  </app-card>
</div>
